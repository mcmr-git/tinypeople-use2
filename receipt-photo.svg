<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#f5f0e8" surfaceScale="1.5" result="lit">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="lit" operator="arithmetic" k1="0.8" k2="0.3" k3="0" k4="0"/>
    </filter>
  </defs>
  <!-- Shadow -->
  <rect x="8" y="8" width="184" height="244" rx="4" fill="rgba(0,0,0,0.1)"/>
  <!-- Receipt paper -->
  <rect x="4" y="4" width="184" height="244" rx="3" fill="#faf8f3"/>
  <rect x="4" y="4" width="184" height="244" rx="3" fill="#f8f5ed" opacity="0.5"/>
  <!-- Apple logo area -->
  <circle cx="96" cy="32" r="10" fill="none" stroke="#333" stroke-width="1.5"/>
  <path d="M96 24 C93 28, 93 36, 96 40 C99 36, 99 28, 96 24Z" fill="#333" opacity="0.7"/>
  <!-- Store name -->
  <text x="96" y="56" text-anchor="middle" font-family="SF Pro, -apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#1d1d1f">Apple Store</text>
  <text x="96" y="68" text-anchor="middle" font-family="SF Pro, -apple-system, Helvetica, Arial, sans-serif" font-size="7" fill="#86868b">5th Avenue, New York, NY</text>
  <!-- Divider -->
  <line x1="20" y1="80" x2="172" y2="80" stroke="#d2d2d7" stroke-width="0.5" stroke-dasharray="3,2"/>
  <!-- Items -->
  <text x="20" y="98" font-family="SF Mono, Courier, monospace" font-size="8" fill="#1d1d1f">AirPods Pro (2nd gen)</text>
  <text x="172" y="98" text-anchor="end" font-family="SF Mono, Courier, monospace" font-size="8" fill="#1d1d1f">$249.00</text>
  <text x="20" y="112" font-family="SF Mono, Courier, monospace" font-size="7" fill="#86868b">Qty: 1  SKU: MTJV3AM/A</text>
  <!-- Divider -->
  <line x1="20" y1="126" x2="172" y2="126" stroke="#d2d2d7" stroke-width="0.5" stroke-dasharray="3,2"/>
  <!-- Subtotal -->
  <text x="20" y="142" font-family="SF Mono, Courier, monospace" font-size="8" fill="#86868b">Subtotal</text>
  <text x="172" y="142" text-anchor="end" font-family="SF Mono, Courier, monospace" font-size="8" fill="#86868b">$249.00</text>
  <text x="20" y="156" font-family="SF Mono, Courier, monospace" font-size="8" fill="#86868b">Tax</text>
  <text x="172" y="156" text-anchor="end" font-family="SF Mono, Courier, monospace" font-size="8" fill="#86868b">$22.09</text>
  <!-- Divider -->
  <line x1="20" y1="168" x2="172" y2="168" stroke="#1d1d1f" stroke-width="0.8"/>
  <!-- Total -->
  <text x="20" y="184" font-family="SF Pro, -apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#1d1d1f">TOTAL</text>
  <text x="172" y="184" text-anchor="end" font-family="SF Pro, -apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#1d1d1f">$271.09</text>
  <!-- Payment -->
  <text x="20" y="202" font-family="SF Mono, Courier, monospace" font-size="7" fill="#86868b">Apple Pay  ****4821</text>
  <text x="20" y="214" font-family="SF Mono, Courier, monospace" font-size="7" fill="#86868b">Feb 28, 2026  3:42 PM</text>
  <!-- Barcode -->
  <g transform="translate(40, 226)">
    <rect x="0" y="0" width="1.5" height="16" fill="#1d1d1f"/><rect x="4" y="0" width="1" height="16" fill="#1d1d1f"/>
    <rect x="7" y="0" width="2" height="16" fill="#1d1d1f"/><rect x="11" y="0" width="1" height="16" fill="#1d1d1f"/>
    <rect x="14" y="0" width="1.5" height="16" fill="#1d1d1f"/><rect x="18" y="0" width="1" height="16" fill="#1d1d1f"/>
    <rect x="21" y="0" width="2" height="16" fill="#1d1d1f"/><rect x="25" y="0" width="1" height="16" fill="#1d1d1f"/>
    <rect x="28" y="0" width="1.5" height="16" fill="#1d1d1f"/><rect x="32" y="0" width="2" height="16" fill="#1d1d1f"/>
    <rect x="36" y="0" width="1" height="16" fill="#1d1d1f"/><rect x="39" y="0" width="1.5" height="16" fill="#1d1d1f"/>
    <rect x="43" y="0" width="1" height="16" fill="#1d1d1f"/><rect x="46" y="0" width="2" height="16" fill="#1d1d1f"/>
    <rect x="50" y="0" width="1.5" height="16" fill="#1d1d1f"/><rect x="54" y="0" width="1" height="16" fill="#1d1d1f"/>
    <rect x="57" y="0" width="2" height="16" fill="#1d1d1f"/><rect x="62" y="0" width="1" height="16" fill="#1d1d1f"/>
    <rect x="65" y="0" width="1.5" height="16" fill="#1d1d1f"/><rect x="69" y="0" width="2" height="16" fill="#1d1d1f"/>
    <rect x="73" y="0" width="1" height="16" fill="#1d1d1f"/><rect x="76" y="0" width="1.5" height="16" fill="#1d1d1f"/>
    <rect x="80" y="0" width="1" height="16" fill="#1d1d1f"/><rect x="83" y="0" width="2" height="16" fill="#1d1d1f"/>
    <rect x="87" y="0" width="1.5" height="16" fill="#1d1d1f"/><rect x="91" y="0" width="1" height="16" fill="#1d1d1f"/>
    <rect x="94" y="0" width="2" height="16" fill="#1d1d1f"/><rect x="98" y="0" width="1" height="16" fill="#1d1d1f"/>
    <rect x="101" y="0" width="1.5" height="16" fill="#1d1d1f"/><rect x="105" y="0" width="2" height="16" fill="#1d1d1f"/>
    <rect x="109" y="0" width="1" height="16" fill="#1d1d1f"/><rect x="112" y="0" width="1.5" height="16" fill="#1d1d1f"/>
  </g>
</svg>