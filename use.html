<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Use Cases — tinypeople</title>
  <meta name="description" content="Explore what tinypeople can do — real use cases, real outcomes.">
  <link rel="icon" href="./favicon.png" type="image/png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0f1e;
      color: #e2e8f0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0.875rem 1.5rem;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 0.5rem;
      text-decoration: none; color: #fff; font-weight: 700; font-size: 1.1rem;
    }
    .nav-brand svg { width: 32px; height: 32px; border-radius: 8px; }
    .nav-links { display: flex; align-items: center; gap: 1rem; }
    .nav-links a {
      color: #94a3b8; text-decoration: none; font-size: 0.875rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #fff; }
    .btn-admin {
      background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3);
      padding: 0.4rem 0.85rem; border-radius: 0.5rem; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-admin:hover { background: rgba(99,102,241,0.25); }
    .btn-signout {
      background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2);
      padding: 0.4rem 0.85rem; border-radius: 0.5rem; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-signout:hover { background: rgba(239,68,68,0.2); }

    /* ── Header ── */
    .page-header {
      max-width: 1200px; margin: 0 auto;
      padding: 3rem 1.5rem 1rem;
    }
    .page-header h1 {
      font-size: 2rem; font-weight: 700; color: #fff;
      margin-bottom: 0.5rem;
    }
    .page-header p {
      color: #64748b; font-size: 1rem; max-width: 600px;
    }

    /* ── Filter Tabs ── */
    .filter-bar {
      max-width: 1200px; margin: 0 auto;
      padding: 0 1.5rem 1.5rem;
    }
    .filter-scroll {
      display: flex; gap: 0.5rem; overflow-x: auto;
      -ms-overflow-style: none; scrollbar-width: none;
      padding-bottom: 0.25rem;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-tab {
      white-space: nowrap;
      padding: 0.45rem 1rem; border-radius: 999px;
      font-size: 0.8rem; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      cursor: pointer; transition: all 0.2s;
      user-select: none;
    }
    .filter-tab:hover {
      background: rgba(255,255,255,0.08);
      color: #cbd5e1;
    }
    .filter-tab.active {
      background: #6366f1;
      color: #fff;
      border-color: #6366f1;
    }

    /* ── Card Grid ── */
    .grid-container {
      max-width: 1200px; margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 1rem;
    }
    @media (min-width: 640px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .card-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── Cards ── */
    .use-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 1rem;
      padding: 1.5rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      position: relative;
      cursor: default;
    }
    .use-card:hover {
      transform: translateY(-3px);
      border-color: rgba(99,102,241,0.3);
      box-shadow: 0 8px 32px rgba(99,102,241,0.08);
    }
    .card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 0.75rem; margin-bottom: 0.75rem;
    }
    .card-title {
      font-size: 1rem; font-weight: 600; color: #f1f5f9;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 0.875rem; color: #64748b; line-height: 1.6;
    }
    .badge {
      flex-shrink: 0;
      padding: 0.2rem 0.6rem; border-radius: 999px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .badge-proactive {
      background: rgba(251,146,60,0.12); color: #fb923c;
      border: 1px solid rgba(251,146,60,0.2);
    }
    .badge-reactive {
      background: rgba(45,212,191,0.12); color: #2dd4bf;
      border: 1px solid rgba(45,212,191,0.2);
    }

    /* ── Admin Controls on Card ── */
    .card-admin {
      display: flex; gap: 0.5rem; margin-top: 1rem;
      padding-top: 0.75rem; border-top: 1px solid rgba(255,255,255,0.06);
    }
    .card-admin button {
      flex: 1; padding: 0.35rem 0;
      border-radius: 0.375rem; font-size: 0.75rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s; border: none;
    }
    .btn-edit {
      background: rgba(99,102,241,0.12); color: #818cf8;
    }
    .btn-edit:hover { background: rgba(99,102,241,0.25); }
    .btn-delete {
      background: rgba(239,68,68,0.1); color: #f87171;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    /* ── Admin FAB ── */
    .fab-add {
      position: fixed; bottom: 2rem; right: 2rem;
      width: 56px; height: 56px; border-radius: 50%;
      background: #6366f1; color: #fff; border: none;
      font-size: 1.75rem; cursor: pointer;
      box-shadow: 0 4px 24px rgba(99,102,241,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      display: none; align-items: center; justify-content: center;
      z-index: 200;
    }
    .fab-add:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 32px rgba(99,102,241,0.5);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem; padding: 2rem;
      width: 100%; max-width: 500px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 {
      font-size: 1.25rem; font-weight: 700; color: #fff; margin-bottom: 1.5rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: #94a3b8; margin-bottom: 0.4rem;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; padding: 0.6rem 0.85rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.5rem; color: #e2e8f0;
      font-size: 0.9rem; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #6366f1;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select option { background: #111827; }
    .modal-actions {
      display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem;
    }
    .btn-cancel {
      padding: 0.55rem 1.2rem; border-radius: 0.5rem;
      background: rgba(255,255,255,0.06); color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.875rem; font-weight: 500; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); }
    .btn-save {
      padding: 0.55rem 1.2rem; border-radius: 0.5rem;
      background: #6366f1; color: #fff; border: none;
      font-size: 0.875rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-save:hover { background: #4f46e5; }

    /* ── Loading ── */
    .loading {
      text-align: center; padding: 4rem 1rem;
      color: #475569; font-size: 0.95rem;
    }
    .loading-spinner {
      width: 32px; height: 32px; border: 3px solid rgba(99,102,241,0.2);
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty State ── */
    .empty-state {
      text-align: center; padding: 4rem 1rem; color: #475569;
    }

    /* ── Hidden utility ── */
    .hidden { display: none !important; }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="./index.html" class="nav-brand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 432.02 432.02">
          <defs><linearGradient id="ng" x1="33.29" y1="33.29" x2="398.73" y2="398.73" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#badcf4"/><stop offset="1" stop-color="#3fa4f4"/></linearGradient></defs>
          <rect width="432.02" height="432.02" rx="113.66" ry="113.66" fill="url(#ng)"/>
          <g fill="#fff"><path d="M153.06,102.81c-7.23,0-13.09,50.68-13.09,113.2s5.86,113.2,13.09,113.2,13.09-50.68,13.09-113.2-5.86-113.2-13.09-113.2Z"/><ellipse cx="195.03" cy="187.9" rx="13.09" ry="59.96"/><ellipse cx="236.99" cy="247.71" rx="13.09" ry="54.79"/><path d="M278.96,97.84c-7.23,0-13.09,52.91-13.09,118.17s5.86,118.17,13.09,118.17,13.09-52.91,13.09-118.17-5.86-118.17-13.09-118.17Z"/><path d="M320.93,155.86c-7.23,0-13.09,26.93-13.09,60.15s5.86,60.15,13.09,60.15,13.09-26.93,13.09-60.15-5.86-60.15-13.09-60.15Z"/><path d="M111.09,144.42c-7.23,0-13.09,32.05-13.09,71.59s5.86,71.59,13.09,71.59,13.09-32.05,13.09-71.59-5.86-71.59-13.09-71.59Z"/></g>
        </svg>
        <span>tinypeople</span>
      </a>
      <div class="nav-links">
        <a href="./index.html">Home</a>
        <span id="auth-area">
          <button class="btn-admin" id="btn-login">Admin</button>
        </span>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="page-header">
    <h1>Use Cases</h1>
    <p>Explore what tinypeople can do — from saving time to knowing yourself better.</p>
  </header>

  <!-- Filter Tabs -->
  <div class="filter-bar">
    <div class="filter-scroll" id="filter-tabs">
      <button class="filter-tab active" data-category="All">All</button>
      <button class="filter-tab" data-category="Work & Productivity">Work & Productivity</button>
      <button class="filter-tab" data-category="Health & Body">Health & Body</button>
      <button class="filter-tab" data-category="Self-Knowledge">Self-Knowledge</button>
      <button class="filter-tab" data-category="Family & Relationships">Family & Relationships</button>
      <button class="filter-tab" data-category="Finance">Finance</button>
      <button class="filter-tab" data-category="Learning & Creativity">Learning & Creativity</button>
      <button class="filter-tab" data-category="Travel & Home">Travel & Home</button>
    </div>
  </div>

  <!-- Card Grid -->
  <main class="grid-container">
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
      Loading use cases...
    </div>
    <div class="card-grid" id="card-grid"></div>
    <div class="empty-state hidden" id="empty-state">No use cases found for this category.</div>
  </main>

  <!-- Admin: Add FAB -->
  <button class="fab-add hidden" id="fab-add" title="Add use case">+</button>

  <!-- Modal: Add/Edit -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Add Use Case</h2>
      <form id="use-form">
        <input type="hidden" id="form-id">
        <div class="form-group">
          <label for="form-title">Title</label>
          <input type="text" id="form-title" required>
        </div>
        <div class="form-group">
          <label for="form-desc">Short Description</label>
          <textarea id="form-desc" required></textarea>
        </div>
        <div class="form-group">
          <label for="form-category">Category</label>
          <select id="form-category" required>
            <option value="">Select…</option>
            <option>Work & Productivity</option>
            <option>Health & Body</option>
            <option>Self-Knowledge</option>
            <option>Family & Relationships</option>
            <option>Finance</option>
            <option>Learning & Creativity</option>
            <option>Travel & Home</option>
          </select>
        </div>
        <div class="form-group">
          <label for="form-type">Type</label>
          <select id="form-type" required>
            <option value="">Select…</option>
            <option value="Proactive">Proactive</option>
            <option value="Reactive">Reactive</option>
          </select>
        </div>
        <div class="form-group">
          <label for="form-score">Sort Score (higher = shown first)</label>
          <input type="number" id="form-score" min="0" max="1000" value="50" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ─── Firebase Config ───
    // TODO: Replace with your actual Firebase project config
    const firebaseConfig = {
      apiKey: "AIzaSyDummyKeyReplace",
      authDomain: "tinypeople-use2.firebaseapp.com",
      projectId: "tinypeople-use2",
      storageBucket: "tinypeople-use2.appspot.com",
      messagingSenderId: "000000000000",
      appId: "1:000000000000:web:0000000000000000"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // ─── Authorized admin emails ───
    const ADMIN_EMAILS = [
      // Add authorized admin emails here
      // "admin@example.com"
    ];

    // ─── State ───
    let useCases = [];
    let currentCategory = 'All';
    let isAdmin = false;

    // ─── DOM refs ───
    const cardGrid = document.getElementById('card-grid');
    const loadingEl = document.getElementById('loading');
    const emptyEl = document.getElementById('empty-state');
    const fabAdd = document.getElementById('fab-add');
    const modalOverlay = document.getElementById('modal-overlay');
    const useForm = document.getElementById('use-form');
    const authArea = document.getElementById('auth-area');

    // ─── Auth ───
    document.getElementById('btn-login').addEventListener('click', () => {
      auth.signInWithPopup(provider).catch(err => console.error('Auth error:', err));
    });

    auth.onAuthStateChanged(user => {
      if (user && ADMIN_EMAILS.includes(user.email)) {
        isAdmin = true;
        authArea.innerHTML = `
          <span style="color:#818cf8;font-size:0.8rem;font-weight:500;margin-right:0.5rem">${user.email}</span>
          <button class="btn-signout" id="btn-signout">Sign Out</button>
        `;
        document.getElementById('btn-signout').addEventListener('click', () => auth.signOut());
        fabAdd.classList.remove('hidden');
        fabAdd.style.display = 'flex';
        renderCards();
      } else {
        isAdmin = false;
        authArea.innerHTML = '<button class="btn-admin" id="btn-login">Admin</button>';
        document.getElementById('btn-login').addEventListener('click', () => {
          auth.signInWithPopup(provider).catch(err => console.error('Auth error:', err));
        });
        fabAdd.classList.add('hidden');
        fabAdd.style.display = 'none';
        renderCards();
      }
    });

    // ─── Firestore: Load use cases ───
    function loadUseCases() {
      db.collection('useCases')
        .orderBy('sort_score', 'desc')
        .onSnapshot(snapshot => {
          useCases = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          loadingEl.classList.add('hidden');
          renderCards();
        }, err => {
          console.error('Firestore error:', err);
          loadingEl.innerHTML = 'Failed to load use cases. Check console for details.';
        });
    }

    // ─── Render Cards ───
    function renderCards() {
      const filtered = currentCategory === 'All'
        ? useCases
        : useCases.filter(uc => uc.category === currentCategory);

      if (filtered.length === 0 && useCases.length > 0) {
        emptyEl.classList.remove('hidden');
      } else {
        emptyEl.classList.add('hidden');
      }

      // Capture FLIP state before DOM changes
      const existingCards = cardGrid.querySelectorAll('.use-card');
      let flipState = null;
      if (existingCards.length > 0) {
        flipState = Flip.getState(existingCards);
      }

      cardGrid.innerHTML = '';
      filtered.forEach(uc => {
        const card = document.createElement('div');
        card.className = 'use-card';
        card.dataset.id = uc.id;
        card.dataset.category = uc.category || '';
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">${escHtml(uc.title || '')}</div>
            <span class="badge ${uc.type === 'Proactive' ? 'badge-proactive' : 'badge-reactive'}">
              ${escHtml(uc.type || '')}
            </span>
          </div>
          <div class="card-desc">${escHtml(uc.description || '')}</div>
          ${isAdmin ? `
          <div class="card-admin">
            <button class="btn-edit" onclick="editCard('${uc.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteCard('${uc.id}', '${escHtml(uc.title || '')}')">Delete</button>
          </div>` : ''}
        `;
        cardGrid.appendChild(card);
      });

      // Animate with FLIP if we had previous state
      if (flipState) {
        Flip.from(flipState, {
          duration: 0.5,
          ease: 'power2.inOut',
          stagger: 0.03,
          absolute: true,
          onEnter: elements => gsap.fromTo(elements,
            { opacity: 0, scale: 0.8 },
            { opacity: 1, scale: 1, duration: 0.4 }
          ),
          onLeave: elements => gsap.to(elements,
            { opacity: 0, scale: 0.8, duration: 0.3 }
          )
        });
      } else {
        // Initial load: fade in
        gsap.fromTo(
          cardGrid.querySelectorAll('.use-card'),
          { opacity: 0, y: 30 },
          { opacity: 1, y: 0, duration: 0.4, stagger: 0.04, ease: 'power2.out' }
        );
      }
    }

    // ─── Filter Tabs ───
    document.getElementById('filter-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;

      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      const newCategory = tab.dataset.category;
      if (newCategory === currentCategory) return;

      // Capture state BEFORE changing category
      const existingCards = cardGrid.querySelectorAll('.use-card');
      const flipState = existingCards.length > 0 ? Flip.getState(existingCards) : null;

      currentCategory = newCategory;

      const filtered = currentCategory === 'All'
        ? useCases
        : useCases.filter(uc => uc.category === currentCategory);

      if (filtered.length === 0 && useCases.length > 0) {
        emptyEl.classList.remove('hidden');
      } else {
        emptyEl.classList.add('hidden');
      }

      cardGrid.innerHTML = '';
      filtered.forEach(uc => {
        const card = document.createElement('div');
        card.className = 'use-card';
        card.dataset.id = uc.id;
        card.dataset.category = uc.category || '';
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">${escHtml(uc.title || '')}</div>
            <span class="badge ${uc.type === 'Proactive' ? 'badge-proactive' : 'badge-reactive'}">
              ${escHtml(uc.type || '')}
            </span>
          </div>
          <div class="card-desc">${escHtml(uc.description || '')}</div>
          ${isAdmin ? `
          <div class="card-admin">
            <button class="btn-edit" onclick="editCard('${uc.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteCard('${uc.id}', '${escHtml(uc.title || '')}')">Delete</button>
          </div>` : ''}
        `;
        cardGrid.appendChild(card);
      });

      // Animate new cards in
      const newCards = cardGrid.querySelectorAll('.use-card');
      if (flipState && newCards.length > 0) {
        gsap.fromTo(newCards,
          { opacity: 0, y: 40, scale: 0.92 },
          { opacity: 1, y: 0, scale: 1, duration: 0.45, stagger: 0.04, ease: 'power2.out' }
        );
      } else if (newCards.length > 0) {
        gsap.fromTo(newCards,
          { opacity: 0, y: 30 },
          { opacity: 1, y: 0, duration: 0.4, stagger: 0.04, ease: 'power2.out' }
        );
      }
    });

    // ─── Modal: Add/Edit ───
    fabAdd.addEventListener('click', () => openModal());

    function openModal(uc = null) {
      document.getElementById('modal-title').textContent = uc ? 'Edit Use Case' : 'Add Use Case';
      document.getElementById('form-id').value = uc ? uc.id : '';
      document.getElementById('form-title').value = uc ? uc.title : '';
      document.getElementById('form-desc').value = uc ? uc.description : '';
      document.getElementById('form-category').value = uc ? uc.category : '';
      document.getElementById('form-type').value = uc ? uc.type : '';
      document.getElementById('form-score').value = uc ? uc.sort_score : 50;
      modalOverlay.classList.add('open');
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      useForm.reset();
    }

    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) closeModal();
    });

    useForm.addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('form-id').value;
      const data = {
        title: document.getElementById('form-title').value.trim(),
        description: document.getElementById('form-desc').value.trim(),
        category: document.getElementById('form-category').value,
        type: document.getElementById('form-type').value,
        sort_score: parseInt(document.getElementById('form-score').value, 10) || 50,
        updated_at: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        if (id) {
          await db.collection('useCases').doc(id).update(data);
        } else {
          data.created_at = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection('useCases').add(data);
        }
        closeModal();
      } catch (err) {
        console.error('Save error:', err);
        alert('Failed to save. Check console.');
      }
    });

    // ─── Edit / Delete ───
    function editCard(id) {
      const uc = useCases.find(u => u.id === id);
      if (uc) openModal(uc);
    }

    function deleteCard(id, title) {
      if (!confirm(`Delete "${title}"?`)) return;
      db.collection('useCases').doc(id).delete()
        .catch(err => {
          console.error('Delete error:', err);
          alert('Failed to delete.');
        });
    }

    // ─── Helpers ───
    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ─── Init ───
    loadUseCases();
  </script>
</body>
</html>
