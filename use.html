  <style>
    .sticky-filter { position: sticky; top: 72px; z-index: 40; }
    .fixed-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; }
    body { background-color: #FDFCF8; }
    .filter-scroll { overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-pill { white-space: nowrap; }

    /* ── View modes ── */
    .use-grid {
      display: grid; grid-template-columns: 1fr; gap: 1.5rem;
    }
    @media (min-width: 48rem) { .use-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (min-width: 64rem) { .use-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

    .use-card { transition: opacity 0.25s ease, transform 0.25s ease; }
    .use-card.hidden-card { display: none; }

    /* ── Tinder swipe mode ── */
    .swipe-container {
      position: relative; width: 100%; max-width: 480px; height: 400px;
      margin: 0 auto; perspective: 1000px;
    }
    .swipe-card {
      position: absolute; inset: 0; background: white; border-radius: 1.5rem;
      border: 1px solid #e7e5e4; padding: 2rem; display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08); cursor: grab;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
      user-select: none; touch-action: pan-y;
    }
    .swipe-card.dragging { transition: none; cursor: grabbing; }
    .swipe-card.exit-left {
      transform: translateX(-150%) rotate(-20deg); opacity: 0; pointer-events: none;
    }
    .swipe-card.exit-right {
      transform: translateX(150%) rotate(20deg); opacity: 0; pointer-events: none;
    }
    .swipe-overlay {
      position: absolute; top: 1.5rem; right: 1.5rem; padding: 0.5rem 1rem;
      border-radius: 0.5rem; font-weight: 700; font-size: 1.25rem; letter-spacing: 0.05em;
      opacity: 0; transition: opacity 0.15s ease; pointer-events: none; text-transform: uppercase;
    }
    .overlay-yes { border: 3px solid #16a34a; color: #16a34a; }
    .overlay-no { border: 3px solid #dc2626; color: #dc2626; }

    /* Shortlisted / rejected badges on grid cards */
    .badge-shortlisted {
      background: #dcfce7; color: #166534; border: 1px solid #bbf7d0;
    }
    .badge-rejected {
      background: #fee2e2; color: #991b1b; border: 1px solid #fecaca;
    }
    .badge-pending {
      background: #f5f5f4; color: #78716c; border: 1px solid #e7e5e4;
    }

    /* Progress bar */
    .progress-fill { transition: width 0.4s ease; }

    /* Keyboard hint */
    kbd {
      display: inline-block; padding: 2px 6px; font-size: 11px;
      border: 1px solid #d6d3d1; border-radius: 4px; background: #f5f5f4;
      font-family: monospace; color: #57534e;
    }
  </style>

      // ── CALENDAR & SCHEDULING (additional) ──
      { id: 122, title: "Proactive calendar optimization", desc: "Analyzes your week and suggests batching similar meetings, protecting deep work blocks, and flags overcommitment — before the week goes off the rails. Not reactive — the AI speaks up first.", category: "Calendar & Scheduling", type: "proactive", catBg: "bg-purple-50", catText: "text-purple-700", source: "usage" },

      // ── LIFE COACHING & DECISIONS (additional) ──
      { id: 123, title: "Weekly review and wrap-up", desc: "Every Sunday, the AI pulls your calendar, emails, trackers, and goals into one combined review: 'here's where you stand.' Both operational and motivational. The Spotify Wrapped effect, but weekly.", category: "Life Coaching & Decisions", type: "proactive", catBg: "bg-indigo-50", catText: "text-indigo-700", source: "usage" },

      // ── WRITING & CONTENT (additional) ──
      { id: 124, title: "Reading log + living library", desc: "Mention finishing a book — the AI logs title, date, and your reaction. Builds a personal reading history. Ask 'what did I think of that book last year?' and get your own review back.", category: "Writing & Content", type: "reactive", catBg: "bg-cyan-50", catText: "text-cyan-700", source: "usage" },
    ];

    // ══════════════════════════════════════════════
    //  STATE & PERSISTENCE
    // ══════════════════════════════════════════════

    const STORAGE_KEY = 'tinyNature-usecase-decisions';
    const API_URL = '/api/decisions';
    let decisions = {};
    let syncing = false;

    // Load from KV on startup, fall back to localStorage
    async function loadDecisions() {
      try {
        const res = await fetch(API_URL);
        if (res.ok) {
          decisions = await res.json();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
        } else {
          throw new Error('API unavailable');
        }
      } catch {
        decisions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      }
      updateCounters();
      renderCards();
      filterCards();
    }

    function saveDecisions() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(decisions));
      updateCounters();
      // Fire-and-forget sync to KV
      if (!syncing) {
        syncing = true;
        fetch(API_URL, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(decisions),
        }).finally(() => { syncing = false; });
      }
    }

    function getStatus(id) {
      return decisions[id] || 'pending';
    }

    function updateCounters() {
      const shortlisted = Object.values(decisions).filter(v => v === 'shortlisted').length;
      const rejected = Object.values(decisions).filter(v => v === 'rejected').length;
      const el = document.getElementById('shortlist-count');
      el.textContent = `${shortlisted} shortlisted`;
      el.classList.toggle('hidden', shortlisted === 0);
      document.getElementById('btn-export').classList.toggle('hidden', shortlisted === 0);
      document.getElementById('btn-reset').classList.toggle('hidden', Object.keys(decisions).length === 0);
    }

    // ══════════════════════════════════════════════
    //  CATEGORY HANDLING
    // ══════════════════════════════════════════════

    const categoryOrder = ["All", ...new Set(useCases.map(u => u.category))];
    let activeCategory = "All";
    let activeStatusFilter = "all";

    // ══════════════════════════════════════════════
    //  VIEW MODE
    // ══════════════════════════════════════════════

    let viewMode = 'grid';

    function setViewMode(mode) {
      viewMode = mode;
      document.getElementById('grid-view').classList.toggle('hidden', mode !== 'grid');
      document.getElementById('swipe-view').classList.toggle('hidden', mode !== 'swipe');
      document.getElementById('filter-section').classList.toggle('hidden', mode !== 'grid');
      document.getElementById('btn-grid').className = `px-4 py-2 rounded-full text-sm font-medium transition-colors cursor-pointer ${mode === 'grid' ? 'bg-stone-900 text-white' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`;
      document.getElementById('btn-swipe').className = `px-4 py-2 rounded-full text-sm font-medium transition-colors cursor-pointer ${mode === 'swipe' ? 'bg-stone-900 text-white' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`;
      if (mode === 'swipe') initSwipe();
      if (mode === 'grid') { renderCards(); filterCards(); }
    }

    // ══════════════════════════════════════════════
    //  GRID VIEW
    // ══════════════════════════════════════════════

    function renderFilters() {
      const bar = document.getElementById("filter-bar");
      bar.innerHTML = "";
      categoryOrder.forEach(cat => {
        const btn = document.createElement("button");
        btn.textContent = cat;
        const isActive = cat === activeCategory;
        btn.className = "filter-pill shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-colors cursor-pointer select-none "
          + (isActive ? "bg-stone-900 text-white" : "bg-stone-100 text-stone-600 hover:bg-stone-200");
        btn.addEventListener("click", () => { activeCategory = cat; renderFilters(); filterCards(); });
        bar.appendChild(btn);
      });
    }

    function setStatusFilter(sf) {
      activeStatusFilter = sf;
      document.querySelectorAll('[data-sf]').forEach(btn => {
        btn.classList.toggle('ring-2', btn.dataset.sf === sf);
        btn.classList.toggle('ring-stone-400', btn.dataset.sf === sf);
      });
      filterCards();
    }

    function renderCards() {
      const grid = document.getElementById("card-grid");
      grid.innerHTML = "";
      useCases.forEach(uc => {
        const status = getStatus(uc.id);
        const card = document.createElement("div");
        card.className = "use-card bg-white border border-stone-100 rounded-2xl p-6 shadow-sm hover:shadow-lg hover:border-stone-300 transition-all flex flex-col";
        card.setAttribute("data-category", uc.category);
        card.setAttribute("data-type", uc.type);
        card.setAttribute("data-id", uc.id);
        card.setAttribute("data-status", status);

        const isProactive = uc.type === "proactive";
        const statusBadge = status === 'shortlisted'
          ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium badge-shortlisted">Shortlisted</span>'
          : status === 'rejected'
          ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium badge-rejected">Rejected</span>'
          : '';

        card.innerHTML = `
          <div class="flex items-center justify-between mb-3">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${uc.catBg} ${uc.catText}">${uc.category}</span>
            <div class="flex items-center gap-2">
              ${statusBadge}
            </div>
          </div>
          <h3 class="text-lg font-medium text-stone-900 mb-2 leading-tight">${uc.title}</h3>
          <p class="text-sm text-stone-500 leading-relaxed mb-4 flex-1">${uc.desc}</p>
          <div class="flex items-center justify-between mt-auto">
            <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium ${isProactive ? 'bg-green-50 text-green-700' : 'bg-stone-100 text-stone-600'}">
              <span class="w-2 h-2 rounded-full ${isProactive ? 'bg-green-400' : 'bg-stone-400'}"></span>
              ${isProactive ? 'Proactive' : 'Reactive'}
            </span>
            <div class="flex gap-1">
              <button onclick="event.stopPropagation(); decide(${uc.id}, 'shortlisted')" class="w-8 h-8 rounded-full flex items-center justify-center text-sm transition-colors ${status === 'shortlisted' ? 'bg-green-500 text-white' : 'bg-green-50 text-green-600 hover:bg-green-100'} cursor-pointer" title="Shortlist">&#10003;</button>
              <button onclick="event.stopPropagation(); decide(${uc.id}, 'rejected')" class="w-8 h-8 rounded-full flex items-center justify-center text-sm transition-colors ${status === 'rejected' ? 'bg-red-500 text-white' : 'bg-red-50 text-red-400 hover:bg-red-100'} cursor-pointer" title="Reject">&times;</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function decide(id, status) {
      if (decisions[id] === status) {
        delete decisions[id]; // toggle off
      } else {
        decisions[id] = status;
      }
      saveDecisions();
      renderCards();
      filterCards();
    }

    function filterCards() {
      const cards = document.querySelectorAll(".use-card");
      let visibleCount = 0;
      cards.forEach(card => {
        const cat = card.getAttribute("data-category");
        const status = card.getAttribute("data-status");
        const catMatch = activeCategory === "All" || cat === activeCategory;
        const statusMatch = activeStatusFilter === "all"
          || (activeStatusFilter === "pending" && status === "pending")
          || activeStatusFilter === status;
        if (catMatch && statusMatch) {
          card.classList.remove("hidden-card");
          visibleCount++;
        } else {
          card.classList.add("hidden-card");
        }
      });
      document.getElementById("use-count").textContent = `Showing ${visibleCount} of ${useCases.length} use cases`;
    }

    // ══════════════════════════════════════════════
    //  SWIPE MODE
    // ══════════════════════════════════════════════

    let swipeQueue = [];
    let swipeIndex = 0;

    function initSwipe() {
      // Queue = only undecided use cases
      swipeQueue = useCases.filter(uc => !decisions[uc.id]);
      swipeIndex = 0;
      document.getElementById('swipe-done').classList.add('hidden');
      document.getElementById('swipe-container').classList.remove('hidden');
      renderSwipeCards();
      updateSwipeProgress();
    }

    function renderSwipeCards() {
      const container = document.getElementById('swipe-container');
      container.innerHTML = '';
      if (swipeIndex >= swipeQueue.length) {
        showSwipeDone();
        return;
      }
      // Render top 2 cards (next underneath, current on top)
      const indices = [swipeIndex + 1, swipeIndex].filter(i => i < swipeQueue.length);
      indices.forEach((idx, stackPos) => {
        const uc = swipeQueue[idx];
        const isTop = idx === swipeIndex;
        const card = document.createElement('div');
        card.className = 'swipe-card';
        card.id = `swipe-${uc.id}`;
        if (!isTop) {
          card.style.transform = 'scale(0.95) translateY(8px)';
          card.style.opacity = '0.7';
          card.style.zIndex = '1';
        } else {
          card.style.zIndex = '10';
        }

        const isProactive = uc.type === 'proactive';
        card.innerHTML = `
          <div class="overlay-yes swipe-overlay">Shortlist</div>
          <div class="overlay-no swipe-overlay" style="right:auto;left:1.5rem">Skip</div>
          <div class="flex items-center justify-between mb-4">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${uc.catBg} ${uc.catText}">${uc.category}</span>
            <div class="flex items-center gap-2">
              <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium ${isProactive ? 'bg-green-50 text-green-700' : 'bg-stone-100 text-stone-600'}">
                <span class="w-2 h-2 rounded-full ${isProactive ? 'bg-green-400' : 'bg-stone-400'}"></span>
                ${isProactive ? 'Proactive' : 'Reactive'}
              </span>
            </div>
          </div>
          <h3 class="text-xl font-semibold text-stone-900 mb-3 leading-tight">${uc.title}</h3>
          <p class="text-base text-stone-500 leading-relaxed flex-1">${uc.desc}</p>
          <div class="mt-4 pt-4 border-t border-stone-100 text-xs text-stone-400 text-center">
            Swipe right to shortlist &middot; Swipe left to reject
          </div>
        `;

        if (isTop) setupDrag(card, uc.id);
        container.appendChild(card);
      });
    }

    function setupDrag(card, ucId) {
      let startX = 0, currentX = 0, isDragging = false;

      function onStart(e) {
        isDragging = true;
        startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        card.classList.add('dragging');
      }
      function onMove(e) {
        if (!isDragging) return;
        const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        currentX = x - startX;
        const rotate = currentX * 0.1;
        card.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;

        // Show overlays
        const yesOverlay = card.querySelector('.overlay-yes');
        const noOverlay = card.querySelector('.overlay-no');
        yesOverlay.style.opacity = Math.min(currentX / 100, 1);
        noOverlay.style.opacity = Math.min(-currentX / 100, 1);
      }
      function onEnd() {
        if (!isDragging) return;
        isDragging = false;
        card.classList.remove('dragging');
        if (currentX > 100) {
          card.classList.add('exit-right');
          setTimeout(() => { decisions[ucId] = 'shortlisted'; saveDecisions(); advanceSwipe(); }, 300);
        } else if (currentX < -100) {
          card.classList.add('exit-left');
          setTimeout(() => { decisions[ucId] = 'rejected'; saveDecisions(); advanceSwipe(); }, 300);
        } else {
          card.style.transform = '';
          card.querySelector('.overlay-yes').style.opacity = 0;
          card.querySelector('.overlay-no').style.opacity = 0;
        }
        currentX = 0;
      }

      card.addEventListener('mousedown', onStart);
      card.addEventListener('touchstart', onStart, { passive: true });
      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, { passive: true });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
    }

    function swipeAction(action) {
      if (swipeIndex >= swipeQueue.length) return;
      const uc = swipeQueue[swipeIndex];
      const card = document.getElementById(`swipe-${uc.id}`);
      if (!card) return;

      if (action === 'shortlist') {
        card.classList.add('exit-right');
        setTimeout(() => { decisions[uc.id] = 'shortlisted'; saveDecisions(); advanceSwipe(); }, 300);
      } else if (action === 'reject') {
        card.classList.add('exit-left');
        setTimeout(() => { decisions[uc.id] = 'rejected'; saveDecisions(); advanceSwipe(); }, 300);
      } else {
        // skip — just move forward without deciding
        card.classList.add('exit-left');
        setTimeout(() => advanceSwipe(), 300);
      }
    }

    function advanceSwipe() {
      swipeIndex++;
      updateSwipeProgress();
      renderSwipeCards();
    }

    function updateSwipeProgress() {
      const total = swipeQueue.length;
      const done = Math.min(swipeIndex, total);
      document.getElementById('swipe-progress-text').textContent = `${done} / ${total}`;
      document.getElementById('swipe-progress-bar').style.width = total > 0 ? `${(done / total) * 100}%` : '0%';
    }

    function showSwipeDone() {
      document.getElementById('swipe-container').classList.add('hidden');
      const shortlisted = Object.values(decisions).filter(v => v === 'shortlisted').length;
      const rejected = Object.values(decisions).filter(v => v === 'rejected').length;
      document.getElementById('swipe-done-text').textContent = `You shortlisted ${shortlisted} use cases and rejected ${rejected}.`;
      document.getElementById('swipe-done').classList.remove('hidden');
    }

    // ══════════════════════════════════════════════
    //  KEYBOARD SHORTCUTS
    // ══════════════════════════════════════════════

    document.addEventListener('keydown', e => {
      if (viewMode !== 'swipe') return;
      if (e.key === 'ArrowRight') { e.preventDefault(); swipeAction('shortlist'); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); swipeAction('reject'); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); swipeAction('skip'); }
    });

    // ══════════════════════════════════════════════
    //  EXPORT & RESET
    // ══════════════════════════════════════════════

    function exportShortlist() {
      const shortlisted = useCases.filter(uc => decisions[uc.id] === 'shortlisted');
      const text = shortlisted.map((uc, i) => `${i+1}. ${uc.title}\n   ${uc.desc}\n   Category: ${uc.category} | Type: ${uc.type}`).join('\n\n');
      const blob = new Blob([`tinyNature — Shortlisted Use Cases\n${'='.repeat(40)}\n\n${text}`], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tinyNature-shortlisted-usecases.txt';
      a.click();
    }

    function resetDecisions() {
      if (!confirm('Reset all shortlist/reject decisions?')) return;
      decisions = {};
      saveDecisions();
      renderCards();
      filterCards();
    }

    // ══════════════════════════════════════════════
    //  INIT
    // ══════════════════════════════════════════════

    renderFilters();
    renderCards();
    filterCards();
    updateCounters();
    loadDecisions(); // Hydrate from KV (re-renders once loaded)
  </script>
</body>

</html>
